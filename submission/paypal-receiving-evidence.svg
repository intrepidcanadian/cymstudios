<svg viewBox="0 0 1200 790" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="790" fill="#ffffff"/>

  <text x="600" y="54" text-anchor="middle" font-size="33" font-weight="700" fill="#0f172a">PayPal taxes the money coming in, too</text>
  <text x="600" y="90" text-anchor="middle" font-size="18" fill="#64748b">What it costs just to receive a tip, donation, or sponsor payment</text>

  <!-- receipts card -->
  <g filter="url(#cardShadow)">
    <rect x="70" y="120" width="1060" height="414" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  </g>

  <!-- header row -->
  <rect x="70" y="120" width="1060" height="54" rx="18" fill="#f1f5f9"/>
  <rect x="70" y="146" width="1060" height="28" fill="#f1f5f9"/>
  <text x="100" y="155" font-size="14" font-weight="600" fill="#475569">Money in</text>
  <text x="440" y="155" font-size="14" font-weight="600" fill="#475569">Amount sent</text>
  <text x="700" y="155" font-size="14" font-weight="600" fill="#475569">What landed in my account</text>
  <text x="1100" y="155" text-anchor="end" font-size="14" font-weight="600" fill="#475569">Lost to fees</text>

  <!-- row 1: sponsor payment -->
  <text x="100" y="218" font-size="20" font-weight="600" fill="#0f172a">Sponsor payment</text>
  <text x="100" y="242" font-size="13" fill="#94a3b8">from abroad · published rate</text>
  <text x="440" y="228" font-size="19" fill="#0f172a">$100.00</text>
  <text x="700" y="218" font-size="19" font-weight="600" fill="#0f172a">$95.30</text>
  <text x="700" y="242" font-size="13" fill="#94a3b8">4.4% + $0.30 international</text>
  <text x="1100" y="228" text-anchor="end" font-size="26" font-weight="800" fill="#dc2626">≈ 5%</text>
  <line x1="100" y1="264" x2="1100" y2="264" stroke="#f1f5f9"/>

  <!-- row 2: cross-border tip -->
  <text x="100" y="296" font-size="20" font-weight="600" fill="#0f172a">Cross-border tip</text>
  <text x="100" y="320" font-size="13" fill="#94a3b8">from a viewer abroad · published rate</text>
  <text x="440" y="306" font-size="19" fill="#0f172a">$20.00</text>
  <text x="700" y="296" font-size="19" font-weight="600" fill="#0f172a">$18.82</text>
  <text x="700" y="320" font-size="13" fill="#94a3b8">4.4% + $0.30 international</text>
  <text x="1100" y="306" text-anchor="end" font-size="26" font-weight="800" fill="#dc2626">≈ 6%</text>
  <line x1="100" y1="342" x2="1100" y2="342" stroke="#f1f5f9"/>

  <!-- row 3: real viewer tip -->
  <text x="100" y="374" font-size="20" font-weight="600" fill="#0f172a">Viewer tip</text>
  <text x="100" y="398" font-size="13" fill="#0d9488">a real $5 tip · 2025</text>
  <text x="440" y="384" font-size="19" fill="#0f172a">$5.00</text>
  <text x="700" y="374" font-size="19" font-weight="600" fill="#0f172a">$4.51</text>
  <text x="700" y="398" font-size="13" fill="#0d9488">$0.49 kept — real receipt</text>
  <text x="1100" y="384" text-anchor="end" font-size="26" font-weight="800" fill="#dc2626">≈ 10%</text>
  <line x1="100" y1="420" x2="1100" y2="420" stroke="#f1f5f9"/>

  <!-- row 4: micro tip -->
  <text x="100" y="452" font-size="20" font-weight="600" fill="#0f172a">Micro-tip</text>
  <text x="100" y="476" font-size="13" fill="#94a3b8">small tips hurt most</text>
  <text x="440" y="462" font-size="19" fill="#0f172a">$2.00</text>
  <text x="700" y="452" font-size="19" font-weight="600" fill="#0f172a">$1.64</text>
  <text x="700" y="476" font-size="13" fill="#94a3b8">2.9% + $0.30 domestic</text>
  <text x="1100" y="462" text-anchor="end" font-size="26" font-weight="800" fill="#dc2626">≈ 18%</text>

  <!-- conflux banner -->
  <rect x="70" y="564" width="1060" height="150" rx="18" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="600" y="620" text-anchor="middle" font-size="30" font-weight="800" fill="#0d9488">The same money, received on Conflux x402 → ≈ 0% lost</text>
  <text x="600" y="656" text-anchor="middle" font-size="17" fill="#0f766e">no platform cut · no FX markup · arrives in seconds · keep 100% of every tip</text>
  <text x="600" y="692" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">cymstudio.app</text>

  <text x="600" y="752" text-anchor="middle" font-size="12" fill="#94a3b8">One real receipt ($5 → $4.51, 2025). Other rows use PayPal’s published receiving rates: 2.9% + $0.30 domestic, 4.4% + $0.30 international.</text>
</svg>
