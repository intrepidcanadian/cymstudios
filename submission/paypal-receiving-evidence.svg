<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="56" text-anchor="middle" font-size="33" font-weight="700" fill="#0f172a">Even a $5 tip gets taxed on the way in</text>
  <text x="600" y="92" text-anchor="middle" font-size="18" fill="#64748b">A real tip a viewer sent me — PayPal vs. receiving on Conflux x402</text>

  <!-- ===== LEFT CARD: PayPal ===== -->
  <g filter="url(#cardShadow)">
    <rect x="70" y="130" width="500" height="430" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <rect x="70" y="130" width="500" height="58" rx="18" fill="#64748b"/>
  <rect x="70" y="160" width="500" height="28" fill="#64748b"/>
  <text x="94" y="167" font-size="19" font-weight="700" fill="#ffffff">PayPal</text>
  <text x="546" y="167" text-anchor="end" font-size="14" fill="#e2e8f0">real receipt · 2025</text>

  <!-- left rows -->
  <text x="100" y="236" font-size="16" fill="#64748b">Viewer sent</text>
  <text x="540" y="236" text-anchor="end" font-size="18" font-weight="600" fill="#0f172a">$5.00</text>
  <line x1="100" y1="256" x2="540" y2="256" stroke="#f1f5f9"/>

  <text x="100" y="290" font-size="16" fill="#64748b">Landed in my account</text>
  <text x="540" y="290" text-anchor="end" font-size="18" font-weight="600" fill="#0f172a">$4.51</text>
  <line x1="100" y1="310" x2="540" y2="310" stroke="#f1f5f9"/>

  <text x="100" y="344" font-size="16" fill="#64748b">PayPal's cut</text>
  <text x="540" y="344" text-anchor="end" font-size="18" font-weight="600" fill="#dc2626">−$0.49</text>
  <line x1="100" y1="364" x2="540" y2="364" stroke="#f1f5f9"/>

  <text x="100" y="398" font-size="16" fill="#64748b">Just to receive it</text>
  <text x="540" y="398" text-anchor="end" font-size="18" font-weight="600" fill="#dc2626">no FX, no withdrawal yet</text>

  <!-- left cost band -->
  <rect x="90" y="430" width="460" height="106" rx="12" fill="#fef2f2"/>
  <text x="320" y="476" text-anchor="middle" font-size="34" font-weight="800" fill="#dc2626">≈ 10% lost</text>
  <text x="320" y="506" text-anchor="middle" font-size="15" fill="#b91c1c">gone before I can even spend it</text>

  <!-- ===== RIGHT CARD: Conflux x402 ===== -->
  <g filter="url(#cardShadow)">
    <rect x="630" y="130" width="500" height="430" rx="18" fill="#ffffff" stroke="#ccfbf1"/>
  </g>
  <rect x="630" y="130" width="500" height="58" rx="18" fill="#0d9488"/>
  <rect x="630" y="160" width="500" height="28" fill="#0d9488"/>
  <text x="654" y="167" font-size="19" font-weight="700" fill="#ffffff">Conflux x402</text>
  <text x="1106" y="167" text-anchor="end" font-size="14" fill="#ccfbf1">cymstudio.app</text>

  <!-- right rows -->
  <text x="660" y="236" font-size="16" fill="#64748b">Viewer sends</text>
  <text x="1100" y="236" text-anchor="end" font-size="18" font-weight="600" fill="#0f172a">$5.00 USDT0</text>
  <line x1="660" y1="256" x2="1100" y2="256" stroke="#f1f5f9"/>

  <text x="660" y="290" font-size="16" fill="#64748b">Lands in my wallet</text>
  <text x="1100" y="290" text-anchor="end" font-size="18" font-weight="600" fill="#0f172a">$5.00 full value</text>
  <line x1="660" y1="310" x2="1100" y2="310" stroke="#f1f5f9"/>

  <text x="660" y="344" font-size="16" fill="#64748b">Platform cut</text>
  <text x="1100" y="344" text-anchor="end" font-size="18" font-weight="600" fill="#059669">$0 (sponsored)</text>
  <line x1="660" y1="364" x2="1100" y2="364" stroke="#f1f5f9"/>

  <text x="660" y="398" font-size="16" fill="#64748b">Settlement</text>
  <text x="1100" y="398" text-anchor="end" font-size="18" font-weight="600" fill="#059669">seconds — dollar-stable</text>

  <!-- right cost band -->
  <rect x="650" y="430" width="460" height="106" rx="12" fill="#ecfdf5"/>
  <text x="880" y="476" text-anchor="middle" font-size="34" font-weight="800" fill="#059669">≈ 0% lost</text>
  <text x="880" y="506" text-anchor="middle" font-size="15" fill="#047857">keep every cent of every tip</text>

  <!-- footer -->
  <text x="600" y="612" text-anchor="middle" font-size="16" fill="#475569"><tspan font-weight="700" fill="#0f172a">cymstudio.app</tspan>  ·  Built on Conflux Network — gasless USDT0 via x402</text>
  <text x="600" y="642" text-anchor="middle" font-size="12" fill="#94a3b8">Real PayPal receipt: a $5 tip arrived as $4.51 (2025). PayPal's published rate for received payments is 2.9% + $0.30 domestic. Stablecoin fees vary by network conditions.</text>
</svg>
